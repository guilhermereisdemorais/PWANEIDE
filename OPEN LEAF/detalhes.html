<html lang="pt-BR" data-theme="dark">

</head>

      <span data-pt="Voltar" data-en="Back">Voltar</span>

      <svg class="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>

<div class="details-page">
  <div class="det-layout">
    <div class="det-cover-wrap">
      <div class="det-cover">
        <img id="detCoverImg" src="imagens/open logo.png" alt="" style="width:100%;height:100%;object-fit:cover"/>
      </div>
      <button class="det-fav-btn" id="favBtn" onclick="toggleFavDet()">
        <svg class="fav-icon-heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span data-pt="Favoritar" data-en="Favorite">Favoritar</span>
      </button>
    </div>

    <div class="det-info">
      <div class="det-badge" id="detCat">—</div>
      <h1 class="det-title" id="detTitle">—</h1>
      <p class="det-author" id="detAuthor">—</p>
      <div class="det-meta">
        <div class="det-meta-item"><span data-pt="Páginas" data-en="Pages">Páginas</span><strong id="detPages">—</strong></div>
        <div class="det-meta-item"><span data-pt="Idioma" data-en="Language">Idioma</span><strong id="detLang">—</strong></div>
        <div class="det-meta-item"><span data-pt="Ano" data-en="Year">Ano</span><strong id="detYear">—</strong></div>
      </div>
      <h3 class="det-desc-title" data-pt="Descrição" data-en="Description">Descrição</h3>
      <p class="det-desc" id="detDesc">—</p>
      <div class="det-prices">
        <div class="price-card buy">
          <div class="pc-label" data-pt="Comprar" data-en="Buy">Comprar</div>
          <div class="pc-val" id="detBuy">—</div>
          <button class="btn-buy" onclick="addCart('buy')" data-pt="Adicionar ao carrinho" data-en="Add to cart">Adicionar ao carrinho</button>
        </div>
        <div class="price-card rent">
          <div class="pc-label" data-pt="Alugar · 30 dias" data-en="Rent · 30 days">Alugar · 30 dias</div>
          <div class="pc-val" id="detRent">—</div>
          <button class="btn-rent" onclick="addCart('rent')" data-pt="Alugar agora" data-en="Rent now">Alugar agora</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="lang.js"></script><script src="theme.js"></script><script src="cart.js"></script>
<script>
// MAPA DE CAPAS
const COVERS = {
  it: 'imagens/It.jpg', fnaf1: 'imagens/fnaf.jpg', fnaf2: 'imagens/olhos prateados.jpg',
  utopia: 'imagens/Utopia.jpg', godzilla: 'imagens/godzilla.jpg', banana: 'imagens/banana.jpg',
  neymar: 'imagens/neymar.jpg', lusiadas: 'imagens/lusiadas.jpg',
  domcasmurro: 'imagens/Dom casmurro.jpg', futebol: 'imagens/Futebol hsitoria.jpg'
};

const DB = {
  it: {titulo:'IT — A Coisa', autor:'Stephen King', cat:'Terror', paginas:1104, idioma:'Português', ano:1986, desc:'Em Derry, uma cidadezinha do Maine, crianças começam a desaparecer. O responsável é uma criatura ancestral e maligna...', comprar:56.99, alugar:25.99},
  fnaf1: {titulo:'FNAF: Fazbear Frights', autor:'Scott Cawthon', cat:'Terror', paginas:256, idioma:'Português', ano:2020, desc:'Five Nights at Freddy\'s: Into the Pit. Oswald explora um lugar abandonado e é transportado para o passado...', comprar:42.99, alugar:18.99},
  fnaf2: {titulo:'FNAF: Olhos Prateados', autor:'Scott Cawthon', cat:'Terror', paginas:240, idioma:'Português', ano:2017, desc:'Cinco crianças se encontram num salão de jogos misterioso e precisam sobreviver...', comprar:39.99, alugar:16.99},
  utopia: {titulo:'Utopia', autor:'Thomas More', cat:'Clássico', paginas:176, idioma:'Português', ano:1516, desc:'Escrita em latim em 1516, Utopia descreve uma sociedade fictícia ideal...', comprar:34.99, alugar:14.99},
  godzilla: {titulo:'Godzilla', autor:'Shigeru Kayama', cat:'Aventura', paginas:192, idioma:'Português', ano:1954, desc:'A novela original que deu origem ao maior monstro do cinema...', comprar:29.99, alugar:11.99},
  banana: {titulo:'Diário de um Banana', autor:'Jeff Kinney', cat:'Infantil', paginas:224, idioma:'Português', ano:2007, desc:'Greg Heffley não é o cara mais popular da escola...', comprar:32.99, alugar:12.99},
  neymar: {titulo:'Neymar', autor:'Ivan Rodrigues', cat:'Esporte', paginas:320, idioma:'Português', ano:2014, desc:'Da infância humilde em Mogi das Cruzes até os palcos do futebol mundial...', comprar:44.99, alugar:19.99},
  lusiadas: {titulo:'Os Lusíadas', autor:'Luís Vaz de Camões', cat:'Clássico', paginas:408, idioma:'Português', ano:1572, desc:'O poema épico de Luís de Camões, maior obra da literatura portuguesa...', comprar:24.99, alugar:9.99},
  domcasmurro: {titulo:'Dom Casmurro', autor:'Machado de Assis', cat:'Clássico', paginas:262, idioma:'Português', ano:1899, desc:'Bentinho, o Dom Casmurro, narra sua história de amor com Capitu...', comprar:19.99, alugar:7.99},
  futebol: {titulo:'História do Futebol', autor:'Max Raillier', cat:'Esporte', paginas:288, idioma:'Português', ano:2018, desc:'Das origens na Inglaterra vitoriana até as Copas do Mundo modernas...', comprar:37.99, alugar:15.99}
};

let livroId = null, livro = null;
function fmt(v){ return 'R$ '+v.toFixed(2).replace('.',','); }

function carregarLivro(){
  livroId = new URLSearchParams(location.search).get('id')||'it';
  livro = DB[livroId];
  if(!livro) return;
  document.title = 'Open Leaf — '+livro.titulo;
  document.getElementById('detCoverImg').src = COVERS[livroId] || 'imagens/open logo.png';
  document.getElementById('detCat').textContent = livro.cat;
  document.getElementById('detTitle').textContent = livro.titulo;
  document.getElementById('detAuthor').textContent = livro.autor;
  document.getElementById('detPages').textContent = livro.paginas;
  document.getElementById('detLang').textContent = livro.idioma;
  document.getElementById('detYear').textContent = livro.ano;
  document.getElementById('detDesc').textContent = livro.desc;
  document.getElementById('detBuy').textContent = fmt(livro.comprar);
  document.getElementById('detRent').textContent = fmt(livro.alugar);
  
  const favs = JSON.parse(localStorage.getItem('ol_favs')||'[]');
  const favBtn = document.getElementById('favBtn');
  if(favs.includes(livroId)){
    favBtn.innerHTML = '<svg class="fav-icon-heart-filled" viewBox="0 0 24 24" fill="currentColor" stroke="none" width="16" height="16"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> <span>Favoritado</span>';
  }
}

function toggleFavDet(){
  const favs = JSON.parse(localStorage.getItem('ol_favs')||'[]');
  const idx = favs.indexOf(livroId);
  const btn = document.getElementById('favBtn');
  if(idx===-1){ 
    favs.push(livroId); 
    btn.innerHTML = '<svg class="fav-icon-heart-filled" viewBox="0 0 24 24" fill="currentColor" stroke="none" width="16" height="16"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> <span>Favoritado</span>'; 
    toast('Adicionado aos favoritos!'); 
  } else { 
    favs.splice(idx,1); 
    btn.innerHTML = '<svg class="fav-icon-heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> <span>Favoritar</span>'; 
    toast('Removido dos favoritos'); 
  }
  localStorage.setItem('ol_favs', JSON.stringify(favs));
}

function addCart(tipo){
  const c = JSON.parse(localStorage.getItem('ol_cart')||'[]');
  if(!c.find(x=>x.id===livroId && x.tipo===tipo)){
    c.push({id:livroId, titulo:livro.titulo, tipo, preco: tipo==='buy' ? livro.comprar : livro.alugar});
  }
  localStorage.setItem('ol_cart', JSON.stringify(c));
  atualizarBadge();
  toast(tipo==='buy' ? 'Adicionado ao carrinho!' : 'Alugado por 30 dias!');
}

function toast(msg){ 
  const t = document.getElementById('toast'); 
  t.textContent = msg; 
  t.classList.add('show'); 
  setTimeout(()=>t.classList.remove('show'), 2800); 
}

carregarLivro();
</script>

      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('✅ SW registrado:', reg))
        .catch(err => console.log('❌ Erro SW:', err));
    });
  }
</script>
</body>
